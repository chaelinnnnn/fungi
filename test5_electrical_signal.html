<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 5 — Assembly / Dissolution</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080808;
    width: 100vw; height: 100vh;
    overflow: hidden; cursor: crosshair;
  }
  canvas { display: block; position: fixed; inset: 0; }
  #title {
    position: fixed; top: 32px; left: 40px;
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.15); text-transform: uppercase;
    z-index: 10; pointer-events: none;
  }
  #mode-label {
    position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%);
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 0.28em;
    color: rgba(255,255,255,0.2); text-transform: uppercase;
    z-index: 10; pointer-events: none;
    transition: opacity 0.5s;
  }
  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.1); text-transform: uppercase;
    white-space: nowrap; z-index: 10; pointer-events: none;
  }
</style>
</head>
<body>
<div id="title">Test 05 — Assembly / Dissolution</div>
<canvas id="c"></canvas>
<div id="mode-label">— circle —</div>
<div id="hint">Click to dissolve and reform</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
const modeLabel = document.getElementById('mode-label');

const CX = () => W / 2;
const CY = () => H / 2;
const R  = () => Math.min(W, H) * 0.33;

// ── Themes: circle bg color + particle color ──
const THEMES = [
  { circleBg: [8,   8,   8  ], fg: [255, 255, 255], name: '— circle —'      },
  { circleBg: [230, 224, 208], fg: [20,  18,  14 ], name: '— phyllotaxis —' },
  { circleBg: [12,  20,  36 ], fg: [150, 205, 255], name: '— spiral —'      },
  { circleBg: [36,  12,  12 ], fg: [255, 175, 120], name: '— rings —'       },
  { circleBg: [12,  28,  18 ], fg: [130, 225, 160], name: '— grid —'        },
  { circleBg: [22,  12,  32 ], fg: [205, 155, 255], name: '— cloud —'       },
];

// ── Formation builders (all positions inside the circle) ──
const PARTICLE_COUNT = 1800;

function formCircle() {
  const cx = CX(), cy = CY(), r = R();
  return Array.from({length: PARTICLE_COUNT}, (_, i) => {
    const golden = Math.PI * (3 - Math.sqrt(5));
    const angle  = i * golden;
    const rad    = Math.sqrt(i / PARTICLE_COUNT) * r * 0.98;
    return { x: cx + Math.cos(angle) * rad, y: cy + Math.sin(angle) * rad };
  });
}

function formPhyllotaxis() {
  const cx = CX(), cy = CY(), r = R();
  return Array.from({length: PARTICLE_COUNT}, (_, i) => {
    const golden = Math.PI * (3 - Math.sqrt(5));
    const angle  = i * golden;
    const t      = i / PARTICLE_COUNT;
    const rad    = Math.sqrt(t) * r * 0.97;
    const noisy  = rad + Math.sin(angle * 7 + t * 22) * r * 0.07;
    return { x: cx + Math.cos(angle) * noisy, y: cy + Math.sin(angle) * noisy };
  });
}

function formSpiral() {
  const cx = CX(), cy = CY(), r = R();
  return Array.from({length: PARTICLE_COUNT}, (_, i) => {
    const t     = i / PARTICLE_COUNT;
    const angle = t * Math.PI * 2 * 8;
    const rad   = t * r * 0.96 + (Math.random() - 0.5) * r * 0.04;
    return { x: cx + Math.cos(angle) * rad, y: cy + Math.sin(angle) * rad };
  });
}

function formRings() {
  const cx = CX(), cy = CY(), r = R();
  const RINGS = 5;
  return Array.from({length: PARTICLE_COUNT}, (_, i) => {
    const ringIdx = i % RINGS;
    const rad     = r * (0.18 + ringIdx * 0.175) + (Math.random() - 0.5) * r * 0.03;
    const angle   = (i / PARTICLE_COUNT) * Math.PI * 2 * RINGS + ringIdx * 0.7;
    return { x: cx + Math.cos(angle) * rad, y: cy + Math.sin(angle) * rad };
  });
}

function formGrid() {
  const cx = CX(), cy = CY(), r = R();
  const cols = Math.ceil(Math.sqrt(PARTICLE_COUNT));
  const step = (r * 1.92) / cols;
  const startX = cx - r * 0.96;
  const startY = cy - r * 0.96;
  const pts = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const x = startX + col * step + (Math.random() - 0.5) * step * 0.3;
    const y = startY + row * step + (Math.random() - 0.5) * step * 0.3;
    // keep inside circle
    const dx = x - cx, dy = y - cy;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < r * 0.97) pts.push({x, y});
    else pts.push({ x: cx + (dx/d)*r*0.9, y: cy + (dy/d)*r*0.9 });
  }
  return pts;
}

function formCloud() {
  const cx = CX(), cy = CY(), r = R();
  return Array.from({length: PARTICLE_COUNT}, () => {
    const angle = Math.random() * Math.PI * 2;
    const rad   = Math.pow(Math.random(), 0.55) * r * 0.96;
    return { x: cx + Math.cos(angle) * rad, y: cy + Math.sin(angle) * rad };
  });
}

const FORMATIONS = [formCircle, formPhyllotaxis, formSpiral, formRings, formGrid, formCloud];

// ── Particles ──
class Particle {
  constructor(i) {
    this.i     = i;
    this.phase = Math.random() * Math.PI * 2;
    this.dotR  = 0.7 + Math.random() * 1.5;
    // start scattered inside circle
    const angle = Math.random() * Math.PI * 2;
    const rad   = Math.random() * R() * 0.9;
    this.x  = CX() + Math.cos(angle) * rad;
    this.y  = CY() + Math.sin(angle) * rad;
    this.tx = this.x; this.ty = this.y;
    this.sx = this.x; this.sy = this.y;
  }

  setTarget(tx, ty) { this.tx = tx; this.ty = ty; }

  // scatter target: random position inside the circle
  setScatter() {
    const angle  = Math.random() * Math.PI * 2;
    const rad    = Math.random() * R() * 0.88;
    this.sx = CX() + Math.cos(angle) * rad;
    this.sy = CY() + Math.sin(angle) * rad;
  }

  update(assembling, prog) {
    const ease = x => x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2)/2;
    const stagger = Math.min(1, Math.max(0,
      assembling
        ? prog * 1.5 - (this.i / PARTICLE_COUNT) * 0.5
        : prog * 1.5 - ((PARTICLE_COUNT - this.i) / PARTICLE_COUNT) * 0.45
    ));
    const e = ease(stagger) * 0.07;
    const tx = assembling ? this.tx : this.sx;
    const ty = assembling ? this.ty : this.sy;
    this.x += (tx - this.x) * e;
    this.y += (ty - this.y) * e;
  }

  draw(fgR, fgG, fgB, assembling, prog) {
    const ease = x => x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2)/2;
    const stagger = Math.min(1, Math.max(0,
      assembling
        ? prog * 1.5 - (this.i / PARTICLE_COUNT) * 0.5
        : prog * 1.5 - ((PARTICLE_COUNT - this.i) / PARTICLE_COUNT) * 0.45
    ));
    const e     = ease(stagger);
    const alpha = assembling ? 0.12 + e * 0.88 : (1 - e * 0.85);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.dotR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${fgR},${fgG},${fgB},${alpha})`;
    ctx.fill();
  }
}

const particles = Array.from({length: PARTICLE_COUNT}, (_, i) => new Particle(i));

// ── State ──
let themeIdx  = 0;
let theme     = THEMES[0];
let curBg     = [...THEMES[0].circleBg];
let targetBg  = [...THEMES[0].circleBg];

let assembling  = true;
let progress    = 0;
let holding     = false;
let holdTimer   = 0;
let transitioning = false;
const ANIM_F    = 230;
const HOLD_F    = 110;

function applyFormation() {
  const targets = FORMATIONS[themeIdx]();
  particles.forEach((p, i) => {
    p.setTarget(targets[i].x, targets[i].y);
    p.setScatter();
  });
}

function triggerNext() {
  if (transitioning) return;
  transitioning = true;

  // dissolve
  assembling = false;
  progress   = 0;
  holding    = false;

  const dissolveMs = (ANIM_F / 60) * 1000 + 150;
  setTimeout(() => {
    // switch theme
    themeIdx  = (themeIdx + 1) % THEMES.length;
    theme     = THEMES[themeIdx];
    targetBg  = [...theme.circleBg];

    modeLabel.style.opacity = '0';
    setTimeout(() => {
      modeLabel.textContent   = theme.name;
      modeLabel.style.opacity = '1';
    }, 350);

    applyFormation();
    assembling    = true;
    progress      = 0;
    transitioning = false;
  }, dissolveMs);
}

applyFormation();
canvas.addEventListener('click', triggerNext);

// ── Main loop ──
function loop() {
  const cx = CX(), cy = CY(), r = R();
  const [fgR, fgG, fgB] = theme.fg;

  // lerp circle bg color
  curBg[0] += (targetBg[0] - curBg[0]) * 0.04;
  curBg[1] += (targetBg[1] - curBg[1]) * 0.04;
  curBg[2] += (targetBg[2] - curBg[2]) * 0.04;

  // 1. clear full canvas with outer bg (always dark)
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  // 2. fill circle with current theme bg color
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = `rgb(${Math.round(curBg[0])},${Math.round(curBg[1])},${Math.round(curBg[2])})`;
  ctx.fill();
  ctx.restore();

  // 3. clip particles to inside circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();

  const prog = Math.min(1, progress / ANIM_F);

  if (holding) {
    holdTimer++;
    particles.forEach(p => {
      p.x += Math.sin(p.phase + holdTimer * 0.03) * 0.07;
      p.y += Math.cos(p.phase + holdTimer * 0.025) * 0.07;
      p.draw(fgR, fgG, fgB, true, 1);
    });
    // just keep holding — only click triggers next
  } else {
    progress++;
    particles.forEach(p => {
      p.update(assembling, prog);
      p.draw(fgR, fgG, fgB, assembling, prog);
    });
    if (progress >= ANIM_F && assembling) {
      holding   = true;
      holdTimer = 0;
    }
  }

  ctx.restore();

  // 4. subtle circle edge
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth   = 1;
  ctx.stroke();
  ctx.restore();

  requestAnimationFrame(loop);
}

loop();

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  applyFormation();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 2 — Blob Colony</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #7a7a7a; width: 100vw; height: 100vh; overflow: hidden; cursor: crosshair; }
  canvas { display: block; position: fixed; inset: 0; }
  #title {
    position: fixed; top: 32px; left: 40px;
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.2em; color: rgba(255,255,255,0.25);
    text-transform: uppercase; z-index: 10; pointer-events: none;
  }
  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.2em; color: rgba(255,255,255,0.18);
    text-transform: uppercase; white-space: nowrap; z-index: 10; pointer-events: none;
  }
  #reset-btn {
    position: fixed; top: 28px; right: 36px;
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.25); background: none;
    border: 1px solid rgba(255,255,255,0.14);
    padding: 6px 14px; cursor: pointer; transition: all 0.3s; z-index: 10;
  }
  #reset-btn:hover { color: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div id="title">Test 02 — Blob Colony</div>
<canvas id="c"></canvas>
<button id="reset-btn" onclick="resetAll()">Clear</button>
<div id="hint">Click to spawn — blobs merge with gradient, separate with own color</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

// Render at half resolution for performance, then scale up
const SCALE = 2;
let sw = Math.ceil(W / SCALE);
let sh = Math.ceil(H / SCALE);

// ── Color palette: [r, g, b] ──
const PALETTE = [
  [232, 120, 152], // pink
  [240, 128,  80], // orange
  [200, 136, 216], // purple
  [240, 100, 100], // coral
  [216, 160, 216], // lavender
  [245, 160, 100], // amber
];
let colorIdx = 0;
function nextColor() {
  const c = PALETTE[colorIdx % PALETTE.length];
  colorIdx++;
  return c;
}

// ── Blob ──
let blobs = [];

class Blob {
  constructor(x, y, r, color) {
    this.x     = x;
    this.y     = y;
    this.r     = r;
    this.color = color; // [r,g,b]
    this.vx    = (Math.random() - 0.5) * 1.1;
    this.vy    = (Math.random() - 0.5) * 1.1;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.007 + Math.random() * 0.007;
  }

  update() {
    this.wobble += this.wobbleSpeed;
    this.vx += (Math.random() - 0.5) * 0.055;
    this.vy += (Math.random() - 0.5) * 0.055;
    this.vx *= 0.965;
    this.vy *= 0.965;
    this.x  += this.vx + Math.sin(this.wobble) * 0.18;
    this.y  += this.vy + Math.cos(this.wobble * 0.75) * 0.18;

    const pad = this.r * 0.5;
    if (this.x < pad)     { this.x = pad;     this.vx =  Math.abs(this.vx) * 0.6; }
    if (this.x > W - pad) { this.x = W - pad; this.vx = -Math.abs(this.vx) * 0.6; }
    if (this.y < pad)     { this.y = pad;     this.vy =  Math.abs(this.vy) * 0.6; }
    if (this.y > H - pad) { this.y = H - pad; this.vy = -Math.abs(this.vy) * 0.6; }
  }
}

// ── Per-pixel metaball renderer ──
const THRESHOLD = 1.0;
// background gray
const BG = [122, 122, 122];

function render() {
  const img  = ctx.createImageData(W, H);
  const data = img.data;

  for (let py = 0; py < sh; py++) {
    for (let px = 0; px < sw; px++) {
      const wx = px * SCALE;
      const wy = py * SCALE;

      // compute per-blob contribution at this pixel
      let totalField = 0;
      let weightedR  = 0;
      let weightedG  = 0;
      let weightedB  = 0;

      for (const b of blobs) {
        const dx = wx - b.x;
        const dy = wy - b.y;
        const d2 = dx*dx + dy*dy;
        const f  = (b.r * b.r) / (d2 + 0.0001);
        totalField += f;
        // weight color by contribution
        weightedR  += f * b.color[0];
        weightedG  += f * b.color[1];
        weightedB  += f * b.color[2];
      }

      let pr, pg, pb, pa;

      if (totalField >= THRESHOLD) {
        // inside metaball — blend colors weighted by field contribution
        pr = Math.min(255, weightedR / totalField);
        pg = Math.min(255, weightedG / totalField);
        pb = Math.min(255, weightedB / totalField);
        pa = 255;
      } else if (totalField >= THRESHOLD * 0.55) {
        // soft edge zone — blend between blob color and bg
        const t  = (totalField - THRESHOLD * 0.55) / (THRESHOLD * 0.45);
        const et = t * t * (3 - 2 * t); // smoothstep
        pr = BG[0] + (Math.min(255, weightedR / Math.max(totalField, 0.0001)) - BG[0]) * et;
        pg = BG[1] + (Math.min(255, weightedG / Math.max(totalField, 0.0001)) - BG[1]) * et;
        pb = BG[2] + (Math.min(255, weightedB / Math.max(totalField, 0.0001)) - BG[2]) * et;
        pa = 255;
      } else {
        pr = BG[0]; pg = BG[1]; pb = BG[2]; pa = 255;
      }

      // stamp SCALE×SCALE block
      for (let dy = 0; dy < SCALE && wy + dy < H; dy++) {
        for (let dx = 0; dx < SCALE && wx + dx < W; dx++) {
          const i = ((wy + dy) * W + (wx + dx)) * 4;
          data[i]   = pr;
          data[i+1] = pg;
          data[i+2] = pb;
          data[i+3] = pa;
        }
      }
    }
  }

  ctx.putImageData(img, 0, 0);
}

// ── Spawn colony ──
function spawnAt(x, y) {
  const color   = nextColor();
  const bodyR   = 22 + Math.random() * 48;
  blobs.push(new Blob(x, y, bodyR, color));

  // satellite blobs — same or alternate color
  const satCount = 1 + Math.floor(Math.random() * 4);
  for (let i = 0; i < satCount; i++) {
    const angle  = (i / satCount) * Math.PI * 2 + Math.random() * 0.8;
    const dist   = bodyR * (0.9 + Math.random() * 1.0);
    const sr     = bodyR * (0.14 + Math.random() * 0.42);
    // alternate between same color and neighboring palette color
    const satColor = Math.random() < 0.5
      ? color
      : PALETTE[(PALETTE.indexOf(color) + 1 + Math.floor(Math.random()*(PALETTE.length-1))) % PALETTE.length];
    const b = new Blob(
      x + Math.cos(angle) * dist,
      y + Math.sin(angle) * dist,
      sr,
      satColor
    );
    b.vx = Math.cos(angle) * (0.4 + Math.random() * 0.6);
    b.vy = Math.sin(angle) * (0.4 + Math.random() * 0.6);
    blobs.push(b);
  }
}

// ── Interaction ──
let painting = false, lastPaint = 0;
canvas.addEventListener('click', e => {
  if (e.target.id === 'reset-btn') return;
  const r = canvas.getBoundingClientRect();
  spawnAt(e.clientX - r.left, e.clientY - r.top);
});
canvas.addEventListener('mousedown', () => painting = true);
canvas.addEventListener('mouseup',   () => painting = false);
canvas.addEventListener('mousemove', e => {
  if (!painting) return;
  const now = Date.now();
  if (now - lastPaint < 400) return;
  lastPaint = now;
  const r = canvas.getBoundingClientRect();
  spawnAt(e.clientX - r.left, e.clientY - r.top);
});

window.resetAll = () => { blobs = []; colorIdx = 0; };

// ── Start empty ──

// ── Loop ──
function loop() {
  blobs.forEach(b => b.update());
  render();
  requestAnimationFrame(loop);
}
loop();

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  sw = Math.ceil(W / SCALE);
  sh = Math.ceil(H / SCALE);
});
</script>
</body>
</html>

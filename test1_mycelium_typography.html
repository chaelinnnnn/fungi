<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 1 — Mycelium Typography</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f3ee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #ui {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 10;
  }
  input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(20,20,16,0.3);
    color: rgba(20,20,16,0.8);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    padding: 6px 4px;
    width: 220px;
    outline: none;
    text-transform: uppercase;
  }
  input::placeholder { color: rgba(20,20,16,0.2); }
  button {
    background: transparent;
    border: 1px solid rgba(20,20,16,0.2);
    color: rgba(20,20,16,0.6);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    padding: 6px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  button:hover {
    background: rgba(20,20,16,0.05);
    color: rgba(20,20,16,1);
    border-color: rgba(20,20,16,0.6);
  }
  #label {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(20,20,16,0.18);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  canvas { display: block; }
</style>
</head>
<body>
<div id="ui">
  <input type="text" id="wordInput" placeholder="type a word..." maxlength="12" />
  <button onclick="growWord()">GROW</button>
  <button onclick="clearCanvas()">CLEAR</button>
</div>
<canvas id="c"></canvas>
<div id="label">Test 01 — Mycelium Typography — Fungi as Language</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Offscreen canvas for letter sampling
const offCanvas = document.createElement('canvas');
const offCtx = offCanvas.getContext('2d');
offCanvas.width = canvas.width;
offCanvas.height = canvas.height;

let branches = [];
let animFrame;
let growing = false;

// Draw letter on offscreen canvas, sample pixel positions
function getLetterPixels(word) {
  offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);
  offCtx.fillStyle = '#fff';
  const fontSize = Math.min(canvas.width / (word.length * 0.7), 320);
  offCtx.font = `900 ${fontSize}px 'Courier New', monospace`;
  offCtx.textAlign = 'center';
  offCtx.textBaseline = 'middle';
  offCtx.fillText(word.toUpperCase(), canvas.width / 2, canvas.height / 2);

  const data = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height).data;
  const pts = [];
  const step = 4;
  for (let y = 0; y < offCanvas.height; y += step) {
    for (let x = 0; x < offCanvas.width; x += step) {
      const i = (y * offCanvas.width + x) * 4;
      if (data[i] > 128) pts.push({ x, y });
    }
  }
  return pts;
}

class Branch {
  constructor(x, y, angle, target, depth, generation) {
    this.x = x;
    this.y = y;
    this.angle = angle;
    this.target = target;
    this.depth = depth;
    this.generation = generation;
    this.length = 0;
    this.maxLength = 6 + Math.random() * 14;
    this.speed = 0.3 + Math.random() * 0.5;
    this.thickness = Math.max(0.15, 1.2 - generation * 0.18);
    this.dead = false;
    this.children = [];
    this.spawned = false;
    this.opacity = 0.08 + Math.random() * 0.35;
    this.hue = 88 + Math.random() * 30; // green-yellow range
    this.lightness = 38 + Math.random() * 28;
    // slight wander
    this.wander = (Math.random() - 0.5) * 0.4;
  }

  update(targetPts) {
    if (this.dead) return;
    // Steer toward nearest target point
    if (targetPts.length > 0 && Math.random() < 0.3) {
      let nearest = null, minD = Infinity;
      const sample = targetPts.filter(() => Math.random() < 0.05);
      for (const p of sample) {
        const d = Math.hypot(p.x - this.x, p.y - this.y);
        if (d < minD) { minD = d; nearest = p; }
      }
      if (nearest) {
        const desired = Math.atan2(nearest.y - this.y, nearest.x - this.x);
        let diff = desired - this.angle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        this.angle += diff * 0.12;
      }
    }

    this.angle += this.wander * 0.1;
    const prevX = this.x, prevY = this.y;
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.length += this.speed;

    // Draw segment
    ctx.beginPath();
    ctx.moveTo(prevX, prevY);
    ctx.lineTo(this.x, this.y);
    ctx.strokeStyle = `rgba(14,14,12,${this.opacity * 0.7})`;
    ctx.lineWidth = this.thickness;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Occasionally draw spore dot
    if (Math.random() < 0.015) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.thickness * 1.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(14,14,12,${this.opacity * 0.55})`;
      ctx.fill();
    }

    if (this.length >= this.maxLength) {
      this.dead = true;
      if (!this.spawned && this.generation < 9) {
        this.spawned = true;
        const numChildren = Math.random() < 0.4 ? 2 : 1;
        for (let i = 0; i < numChildren; i++) {
          const spread = (Math.random() - 0.5) * 1.1;
          branches.push(new Branch(
            this.x, this.y,
            this.angle + spread,
            this.target,
            this.depth + 1,
            this.generation + 1
          ));
        }
      }
    }
  }
}

function growWord() {
  const word = document.getElementById('wordInput').value.trim();
  if (!word) return;
  cancelAnimationFrame(animFrame);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  branches = [];

  const targetPts = getLetterPixels(word);
  if (targetPts.length === 0) return;

  // Seed branches from random target points
  const seedCount = Math.min(80, Math.max(30, word.length * 12));
  for (let i = 0; i < seedCount; i++) {
    const seed = targetPts[Math.floor(Math.random() * targetPts.length)];
    const angle = Math.random() * Math.PI * 2;
    branches.push(new Branch(seed.x, seed.y, angle, targetPts, 0, 0));
  }

  growing = true;
  animate(targetPts);
}

function animate(targetPts) {
  const alive = branches.filter(b => !b.dead);
  if (alive.length === 0) { growing = false; return; }

  // Process batch per frame for performance
  const batch = alive.slice(0, 120);
  for (const b of batch) b.update(targetPts);

  animFrame = requestAnimationFrame(() => animate(targetPts));
}

function clearCanvas() {
  cancelAnimationFrame(animFrame);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  branches = [];
  growing = false;
}

document.getElementById('wordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') growWord();
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  offCanvas.width = canvas.width;
  offCanvas.height = canvas.height;
});
</script>
</body>
</html>

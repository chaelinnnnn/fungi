<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 3 — Clay Typography</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0ece4;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #c { display: block; position: fixed; inset: 0; }
  #input-wrap {
    position: fixed;
    bottom: 56px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; align-items: center; z-index: 10;
  }
  input {
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(30,26,20,0.25);
    color: rgba(30,26,20,0.7);
    font-family: 'Courier New', monospace;
    font-size: 12px; letter-spacing: 0.18em;
    padding: 6px 4px; width: 260px; outline: none;
    text-transform: uppercase;
    caret-color: rgba(30,26,20,0.6);
  }
  input::placeholder { color: rgba(30,26,20,0.2); }
  button {
    background: transparent;
    border: 1px solid rgba(30,26,20,0.18);
    color: rgba(30,26,20,0.4);
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    padding: 6px 14px; cursor: pointer; text-transform: uppercase;
    transition: all 0.3s;
  }
  button:hover { border-color: rgba(30,26,20,0.45); color: rgba(30,26,20,0.75); }
  #title {
    position: fixed; top: 32px; left: 40px;
    font-size: 10px; letter-spacing: 0.2em;
    color: rgba(30,26,20,0.2); text-transform: uppercase; z-index: 10;
  }
  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.2em;
    color: rgba(30,26,20,0.18); text-transform: uppercase;
    white-space: nowrap; z-index: 10;
  }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 10px; letter-spacing: 0.25em; color: rgba(30,26,20,0.3);
    text-transform: uppercase; z-index: 20; background: #f0ece4;
    transition: opacity 0.6s;
  }
</style>
</head>
<body>
<div id="title">Test 03 — Clay Typography</div>
<div id="loading">Loading font...</div>
<canvas id="c"></canvas>
<div id="input-wrap">
  <input id="textInput" type="text" placeholder="type anything..." maxlength="20" />
  <button onclick="clearAll()">Clear</button>
</div>
<div id="hint">Type to generate clay letters — drag to rotate</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color('#f0ece4');

// ── Camera ──
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 16);

// ── Controls ──
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.enableZoom = false;
controls.enablePan = false;
controls.minPolarAngle = Math.PI * 0.28;
controls.maxPolarAngle = Math.PI * 0.62;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.target.set(0, 0, 0);

// ── Lights ──
scene.add(new THREE.AmbientLight('#fff8f0', 0.85));

const key = new THREE.DirectionalLight('#fffaf0', 2.8);
key.position.set(5, 12, 8);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1;
key.shadow.camera.far  = 50;
key.shadow.camera.left = key.shadow.camera.bottom = -16;
key.shadow.camera.right = key.shadow.camera.top  =  16;
key.shadow.radius = 10;
key.shadow.bias = -0.001;
scene.add(key);

const fill = new THREE.DirectionalLight('#b8d0ff', 1.0);
fill.position.set(-8, 3, -3);
scene.add(fill);

const rim = new THREE.DirectionalLight('#ffc8a0', 0.55);
rim.position.set(0, -5, -8);
scene.add(rim);

// Shadow ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.ShadowMaterial({ opacity: 0.07 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.4;
ground.receiveShadow = true;
scene.add(ground);

// ── Clay color palette ──
const PALETTE = [
  '#e05c52', '#f5a020', '#6dbf4a',
  '#4a8fe0', '#c44fcf', '#f07898',
  '#f0c030', '#3bbfb8', '#e8783c',
  '#8060d0',
];

function makeClay(hex) {
  const c = new THREE.Color(hex);
  return new THREE.MeshStandardMaterial({
    color: c,
    roughness: 0.78,
    metalness: 0.0,
    emissive: c.clone().multiplyScalar(0.04),
  });
}

// ── State ──
let font    = null;
let letters = [];
let colorIdx = 0;
let lastText = '';

const COLS     = 8;
const SIZE     = 1.15;
const GAP_X    = 1.7;
const GAP_Y    = 2.3;

// ── Load font ──
new FontLoader().load(
  'https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json',
  f => {
    font = f;
    const el = document.getElementById('loading');
    el.style.opacity = '0';
    setTimeout(() => el.style.display = 'none', 600);
    document.getElementById('textInput').focus();
  }
);

// ── Add one letter ──
function spawnLetter(char) {
  if (!font || char === ' ') return;

  const geo = new TextGeometry(char.toUpperCase(), {
    font,
    size:           SIZE,
    height:         0.52,
    curveSegments:  16,
    bevelEnabled:   true,
    bevelThickness: 0.20,
    bevelSize:      0.13,
    bevelOffset:    0,
    bevelSegments:  12,
  });

  geo.computeBoundingBox();
  const bb = geo.boundingBox;
  geo.translate(-(bb.max.x - bb.min.x) / 2, 0, 0);

  const hex  = PALETTE[colorIdx % PALETTE.length];
  colorIdx++;

  const mesh = new THREE.Mesh(geo, makeClay(hex));
  mesh.castShadow    = true;
  mesh.receiveShadow = true;
  mesh.userData      = { tx: 0, ty: 0, tz: 0, born: Date.now() };

  // drop from above
  mesh.position.set(0, 8, 0);
  mesh.rotation.set(-0.4, (Math.random()-0.5)*0.3, (Math.random()-0.5)*0.25);
  scene.add(mesh);
  letters.push(mesh);
  repositionAll();
}

// ── Recompute grid positions ──
function repositionAll() {
  const n    = letters.length;
  const cols = Math.min(n, COLS);
  const rows = Math.ceil(n / COLS);
  const totalW = (cols - 1) * GAP_X;
  const totalH = (rows - 1) * GAP_Y;

  letters.forEach((m, i) => {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    m.userData.tx = -totalW / 2 + col * GAP_X;
    m.userData.ty =  totalH / 2 - row * GAP_Y;
    m.userData.tz = 0;
  });

  // Frame camera on the grid
  const targetY = (rows > 1) ? -(totalH / 2) * 0.3 : 0;
  controls.target.lerp(new THREE.Vector3(0, targetY, 0), 0.08);
}

// ── Remove last letter ──
function removeLast() {
  const m = letters.pop();
  if (!m) return;
  scene.remove(m);
  m.geometry.dispose();
  m.material.dispose();
  colorIdx = Math.max(0, colorIdx - 1);
  repositionAll();
}

// ── Clear ──
window.clearAll = () => {
  letters.forEach(m => {
    scene.remove(m);
    m.geometry.dispose();
    m.material.dispose();
  });
  letters   = [];
  colorIdx  = 0;
  lastText  = '';
  document.getElementById('textInput').value = '';
};

// ── Input ──
document.getElementById('textInput').addEventListener('input', e => {
  const text = e.target.value;
  if (text.length > lastText.length) {
    spawnLetter(text[text.length - 1]);
  } else {
    removeLast();
  }
  lastText = text;
});

// ── Spring animate each letter ──
function animateLetter(m) {
  const { tx, ty, tz } = m.userData;
  m.position.x += (tx - m.position.x) * 0.10;
  m.position.y += (ty - m.position.y) * 0.09;
  m.position.z += (tz - m.position.z) * 0.10;
  m.rotation.x += (0  - m.rotation.x) * 0.08;
  m.rotation.y += (0  - m.rotation.y) * 0.08;
  m.rotation.z += (0  - m.rotation.z) * 0.08;
}

// ── Render loop ──
(function loop() {
  requestAnimationFrame(loop);
  controls.update();
  letters.forEach(animateLetter);
  renderer.render(scene, camera);
})();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 3 — Mycelium Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0b08; width: 100vw; height: 100vh; overflow: hidden; cursor: crosshair; }
  canvas { display: block; position: fixed; inset: 0; }
  #title {
    position: fixed; top: 32px; left: 40px;
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.2em; color: rgba(160,200,100,0.18);
    text-transform: uppercase; z-index: 10; pointer-events: none;
  }
  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.2em; color: rgba(160,200,100,0.14);
    text-transform: uppercase; white-space: nowrap; z-index: 10; pointer-events: none;
  }
  #reset-btn {
    position: fixed; top: 28px; right: 36px;
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(160,200,100,0.2); background: none;
    border: 1px solid rgba(160,200,100,0.12);
    padding: 6px 14px; cursor: pointer; transition: all 0.3s; z-index: 10;
  }
  #reset-btn:hover { color: rgba(160,200,100,0.7); border-color: rgba(160,200,100,0.35); }
</style>
</head>
<body>
<div id="title">Test 03 — Mycelium Network</div>
<canvas id="c"></canvas>
<button id="reset-btn" onclick="resetScene()">Clear</button>
<div id="hint">Click to grow — mycelium expands and connects</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color('#0a0b08');
scene.fog = new THREE.FogExp2('#0a0b08', 0.045);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 3, 12);

// ── Controls ──
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 3;
controls.maxDistance = 22;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.25;
controls.target.set(0, 0, 0);

// ── Lights ──
scene.add(new THREE.AmbientLight('#1a2a10', 1.2));

const pt1 = new THREE.PointLight('#a0d060', 2.5, 18);
pt1.position.set(0, 4, 0);
scene.add(pt1);

const pt2 = new THREE.PointLight('#304820', 1.5, 12);
pt2.position.set(-5, -2, -3);
scene.add(pt2);

const pt3 = new THREE.PointLight('#c8e890', 0.8, 8);
pt3.position.set(5, 2, 4);
scene.add(pt3);

// ── Raycaster for click-to-world ──
const raycaster = new THREE.Raycaster();
const clickPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); // horizontal plane y=0

// ── Mycelium system ──
// Each Hypha is a growing branch: a tube that extends segment by segment
const MAX_GEN   = 6;      // max branching generations
const MAX_HYPHAE = 1200;  // total branch cap

let hyphae      = [];     // all active/growing branches
let nodeMeshes  = [];     // spore dots at branch tips / nodes
let allTipPositions = []; // for inter-colony connection lines
let connectionLines = []; // thin lines between nearby tips

// Material for hyphae tubes — luminous green-white
function hyphaMaterial(generation) {
  const t = generation / MAX_GEN;
  // older generations are dimmer and thinner
  const hue = 88 + t * 20; // shift from yellow-green to cooler green
  const lum = 0.55 - t * 0.25;
  const sat = 0.5 - t * 0.15;
  const col = new THREE.Color().setHSL(hue/360, sat, lum);
  return new THREE.MeshStandardMaterial({
    color: col,
    emissive: col.clone().multiplyScalar(0.35 - t * 0.15),
    roughness: 0.6,
    metalness: 0.0,
    transparent: true,
    opacity: 0.85 - t * 0.3,
  });
}

function sporeMaterial(generation) {
  const t = generation / MAX_GEN;
  const col = new THREE.Color().setHSL((88 + t*20)/360, 0.55, 0.65 - t*0.2);
  return new THREE.MeshStandardMaterial({
    color: col,
    emissive: col.clone().multiplyScalar(0.5),
    roughness: 0.4,
  });
}

class Hypha {
  constructor(origin, direction, generation, speed, rootId) {
    this.origin     = origin.clone();
    this.direction  = direction.clone().normalize();
    this.generation = generation;
    this.speed      = speed;
    this.rootId     = rootId;    // which colony this belongs to

    this.pos        = origin.clone();
    this.length     = 0;
    this.maxLength  = 0.8 + Math.random() * 2.2 - generation * 0.22;
    this.alive      = true;
    this.grown      = false;
    this.age        = 0;

    // wander — slight random deviation per step
    this.wanderStr  = 0.06 + Math.random() * 0.08;
    this.stepSize   = 0.04 + Math.random() * 0.03;

    // tube geometry — built incrementally
    this.points     = [origin.clone()];
    this.tube       = null;
    this.mat        = hyphaMaterial(generation);
    this.segCount   = 0;

    // tip spore
    this.sporeMesh  = null;
  }

  step() {
    if (!this.alive || this.grown) return;
    this.age++;

    // wander direction
    const wander = new THREE.Vector3(
      (Math.random() - 0.5) * this.wanderStr,
      (Math.random() - 0.5) * this.wanderStr * 0.5,
      (Math.random() - 0.5) * this.wanderStr
    );
    this.direction.add(wander).normalize();

    // slight upward bias for younger generations
    if (this.generation < 3) this.direction.y += 0.008;

    // step forward
    this.pos.addScaledVector(this.direction, this.stepSize);
    this.length += this.stepSize;
    this.points.push(this.pos.clone());

    // rebuild tube every few steps
    if (this.points.length >= 2 && this.age % 3 === 0) this.rebuildTube();

    // move spore tip
    if (this.sporeMesh) this.sporeMesh.position.copy(this.pos);

    if (this.length >= this.maxLength) {
      this.grown = true;
      this.rebuildTube();
      this.spawnChildren();
      this.spawnSpore();
      allTipPositions.push(this.pos.clone());
    }
  }

  rebuildTube() {
    if (this.points.length < 2) return;
    if (this.tube) { scene.remove(this.tube); this.tube.geometry.dispose(); }

    const curve  = new THREE.CatmullRomCurve3(this.points);
    const radius = Math.max(0.004, 0.028 - this.generation * 0.004);
    const geo    = new THREE.TubeGeometry(curve, this.points.length * 2, radius, 5, false);
    this.tube    = new THREE.Mesh(geo, this.mat);
    this.tube.castShadow = false;
    scene.add(this.tube);
  }

  spawnChildren() {
    if (this.generation >= MAX_GEN) return;
    if (hyphae.length >= MAX_HYPHAE) return;

    const childCount = this.generation < 2
      ? 2 + Math.floor(Math.random() * 2)
      : 1 + Math.floor(Math.random() * 2);

    for (let i = 0; i < childCount; i++) {
      // spread angle increases with generation for organic fan
      const spread = 0.4 + this.generation * 0.15;
      const childDir = this.direction.clone().add(
        new THREE.Vector3(
          (Math.random() - 0.5) * spread,
          (Math.random() - 0.5) * spread * 0.6,
          (Math.random() - 0.5) * spread
        )
      ).normalize();

      const child = new Hypha(
        this.pos,
        childDir,
        this.generation + 1,
        this.speed * 0.88,
        this.rootId
      );
      hyphae.push(child);
    }
  }

  spawnSpore() {
    const r   = Math.max(0.015, 0.07 - this.generation * 0.008);
    const geo = new THREE.SphereGeometry(r, 8, 8);
    const mat = sporeMaterial(this.generation);
    this.sporeMesh = new THREE.Mesh(geo, mat);
    this.sporeMesh.position.copy(this.pos);
    scene.add(this.sporeMesh);
    nodeMeshes.push(this.sporeMesh);
  }

  dispose() {
    if (this.tube) { scene.remove(this.tube); this.tube.geometry.dispose(); }
    if (this.sporeMesh) { scene.remove(this.sporeMesh); this.sporeMesh.geometry.dispose(); }
  }
}

// ── Spawn colony at world position ──
let rootId = 0;
function spawnColony(pos) {
  const id = rootId++;
  const seedCount = 4 + Math.floor(Math.random() * 4);
  for (let i = 0; i < seedCount; i++) {
    const angle = (i / seedCount) * Math.PI * 2 + Math.random() * 0.5;
    const dir   = new THREE.Vector3(
      Math.cos(angle) * (0.6 + Math.random() * 0.4),
      0.1 + Math.random() * 0.5,
      Math.sin(angle) * (0.6 + Math.random() * 0.4)
    ).normalize();
    hyphae.push(new Hypha(pos, dir, 0, 1.0, id));
  }

  // glowing origin spore
  const geo  = new THREE.SphereGeometry(0.09, 12, 12);
  const col  = new THREE.Color().setHSL(0.25, 0.7, 0.65);
  const mat  = new THREE.MeshStandardMaterial({ color: col, emissive: col.clone().multiplyScalar(0.6), roughness: 0.3 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);
  nodeMeshes.push(mesh);
}

// ── Connection lines between nearby tips (inter-colony mycelium) ──
function updateConnections() {
  // remove old
  connectionLines.forEach(l => { scene.remove(l); l.geometry.dispose(); });
  connectionLines = [];

  const pts = allTipPositions;
  for (let i = 0; i < pts.length; i++) {
    for (let j = i + 1; j < pts.length; j++) {
      const d = pts[i].distanceTo(pts[j]);
      if (d < 2.8 && d > 0.1 && Math.random() < 0.12) {
        const geo = new THREE.BufferGeometry().setFromPoints([pts[i], pts[j]]);
        const mat = new THREE.LineBasicMaterial({
          color: new THREE.Color('#4a6a20'),
          transparent: true,
          opacity: Math.max(0.04, 0.18 - d * 0.05),
        });
        const line = new THREE.Line(geo, mat);
        scene.add(line);
        connectionLines.push(line);
      }
    }
  }
}

// ── Click → world position ──
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const ndc  = new THREE.Vector2(
    ((e.clientX - rect.left) / rect.width)  * 2 - 1,
    -((e.clientY - rect.top)  / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);

  // intersect with a plane slightly tilted toward viewer
  const target = new THREE.Vector3();
  const plane  = new THREE.Plane(new THREE.Vector3(0, 0.3, 1).normalize(), 0);
  if (raycaster.ray.intersectPlane(plane, target)) {
    spawnColony(target);
  }
});

// ── Reset ──
window.resetScene = () => {
  hyphae.forEach(h => h.dispose());
  hyphae = [];
  nodeMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); });
  nodeMeshes = [];
  connectionLines.forEach(l => { scene.remove(l); l.geometry.dispose(); });
  connectionLines = [];
  allTipPositions = [];
  rootId = 0;
};

// ── Render loop ──
const STEPS_PER_FRAME = 18; // how many hypha steps per frame
let connTimer = 0;

(function loop() {
  requestAnimationFrame(loop);

  // grow hyphae
  const alive = hyphae.filter(h => !h.grown);
  const batch  = alive.slice(0, STEPS_PER_FRAME);
  batch.forEach(h => h.step());

  // rebuild connections periodically
  connTimer++;
  if (connTimer % 90 === 0 && allTipPositions.length > 2) updateConnections();

  // subtle light flicker
  pt1.intensity = 2.3 + Math.sin(Date.now() * 0.0008) * 0.3;
  pt3.position.x = Math.sin(Date.now() * 0.0004) * 6;

  controls.update();
  renderer.render(scene, camera);
})();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Seed one colony on load ──
setTimeout(() => spawnColony(new THREE.Vector3(0, 0, 0)), 300);
</script>
</body>
</html>

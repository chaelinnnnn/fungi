<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 3 — Mycelium Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0b08; width: 100vw; height: 100vh; overflow: hidden; cursor: crosshair; }
  canvas { display: block; position: fixed; inset: 0; }
  #title {
    position: fixed; top: 32px; left: 40px;
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.2em; color: rgba(160,200,100,0.18);
    text-transform: uppercase; z-index: 10; pointer-events: none;
  }
  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.2em; color: rgba(160,200,100,0.14);
    text-transform: uppercase; white-space: nowrap; z-index: 10; pointer-events: none;
  }
  #reset-btn {
    position: fixed; top: 28px; right: 36px;
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(160,200,100,0.2); background: none;
    border: 1px solid rgba(160,200,100,0.12);
    padding: 6px 14px; cursor: pointer; transition: all 0.3s; z-index: 10;
  }
  #reset-btn:hover { color: rgba(160,200,100,0.7); border-color: rgba(160,200,100,0.35); }
  #status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.2em; color: rgba(160,200,100,0.4);
    text-transform: uppercase; z-index: 20; pointer-events: none;
  }
</style>
</head>
<body>
<div id="title">Test 03 — Mycelium Network</div>
<canvas id="c"></canvas>
<button id="reset-btn" onclick="resetScene()">Clear</button>
<div id="hint">Click to grow — mycelium expands and connects</div>
<div id="status">Loading...</div>

<!-- Three.js r128 global build -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// Wait for Three.js to be ready
window.addEventListener('load', function() {
  if (typeof THREE === 'undefined') {
    document.getElementById('status').textContent = 'Three.js failed to load';
    return;
  }
  document.getElementById('status').style.display = 'none';
  initScene();
});

function initScene() {
  const canvas = document.getElementById('c');
  let W = window.innerWidth, H = window.innerHeight;

  // ── Renderer ──
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;

  // ── Scene ──
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#0a0b08');
  scene.fog = new THREE.FogExp2('#0a0b08', 0.042);

  // ── Camera ──
  const camera = new THREE.PerspectiveCamera(50, W / H, 0.01, 100);
  camera.position.set(0, 3, 14);
  camera.lookAt(0, 0, 0);

  // ── Simple orbit (manual, no OrbitControls needed) ──
  let isDragging = false, lastX = 0, lastY = 0;
  let rotX = 0.2, rotY = 0;
  let autoRotate = true;

  canvas.addEventListener('mousedown', e => {
    isDragging = true; autoRotate = false;
    lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('mouseup', () => { isDragging = false; });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY += (e.clientX - lastX) * 0.005;
    rotX += (e.clientY - lastY) * 0.003;
    rotX = Math.max(-0.6, Math.min(0.8, rotX));
    lastX = e.clientX; lastY = e.clientY;
  });

  function updateCamera() {
    if (autoRotate) rotY += 0.0018;
    const r = 14;
    camera.position.x = Math.sin(rotY) * Math.cos(rotX) * r;
    camera.position.y = Math.sin(rotX) * r + 2;
    camera.position.z = Math.cos(rotY) * Math.cos(rotX) * r;
    camera.lookAt(0, 0, 0);
  }

  // ── Lights ──
  scene.add(new THREE.AmbientLight('#1a2a10', 1.5));

  const pt1 = new THREE.PointLight('#90c840', 3.0, 20);
  pt1.position.set(0, 5, 0);
  scene.add(pt1);

  const pt2 = new THREE.PointLight('#203010', 2.0, 15);
  pt2.position.set(-6, -2, -4);
  scene.add(pt2);

  const pt3 = new THREE.PointLight('#c0e870', 1.0, 10);
  pt3.position.set(5, 2, 5);
  scene.add(pt3);

  // ── Mycelium system ──
  const MAX_GEN   = 6;
  const MAX_TOTAL = 800;
  let hyphae      = [];
  let nodeMeshes  = [];
  let connLines   = [];
  let tipPositions = [];
  let rootId      = 0;

  function makeHyphaMat(gen) {
    const t   = gen / MAX_GEN;
    const col = new THREE.Color().setHSL(0.24 + t * 0.05, 0.55 - t * 0.1, 0.58 - t * 0.22);
    return new THREE.MeshStandardMaterial({
      color: col,
      emissive: col.clone().multiplyScalar(0.3 - t * 0.1),
      roughness: 0.65,
      transparent: true,
      opacity: 0.9 - t * 0.3,
    });
  }

  function makeSporeMat(gen) {
    const t   = gen / MAX_GEN;
    const col = new THREE.Color().setHSL(0.25, 0.6, 0.65 - t * 0.18);
    return new THREE.MeshStandardMaterial({
      color: col,
      emissive: col.clone().multiplyScalar(0.55 - t * 0.15),
      roughness: 0.4,
    });
  }

  // Hypha class
  function Hypha(origin, dir, gen, id) {
    this.pos       = origin.clone();
    this.dir       = dir.clone().normalize();
    this.gen       = gen;
    this.rootId    = id;
    this.len       = 0;
    this.maxLen    = Math.max(0.3, 1.0 + Math.random() * 1.8 - gen * 0.18);
    this.step      = 0.045 + Math.random() * 0.025;
    this.wander    = 0.055 + Math.random() * 0.07;
    this.grown     = false;
    this.age       = 0;
    this.points    = [origin.clone()];
    this.tube      = null;
    this.spore     = null;
    this.mat       = makeHyphaMat(gen);
  }

  Hypha.prototype.tick = function() {
    if (this.grown) return;
    this.age++;

    // wander
    this.dir.x += (Math.random() - 0.5) * this.wander;
    this.dir.y += (Math.random() - 0.5) * this.wander * 0.4;
    this.dir.z += (Math.random() - 0.5) * this.wander;
    if (this.gen < 3) this.dir.y += 0.006; // upward bias
    this.dir.normalize();

    this.pos.addScaledVector(this.dir, this.step);
    this.len += this.step;
    this.points.push(this.pos.clone());

    // rebuild tube every 4 steps
    if (this.age % 4 === 0) this.rebuildTube();

    if (this.len >= this.maxLen) {
      this.grown = true;
      this.rebuildTube();
      this.makeSpore();
      tipPositions.push(this.pos.clone());
      this.branch();
    }
  };

  Hypha.prototype.rebuildTube = function() {
    if (this.points.length < 2) return;
    if (this.tube) { scene.remove(this.tube); this.tube.geometry.dispose(); }

    const curve = new THREE.CatmullRomCurve3(this.points);
    const segs  = Math.max(2, this.points.length * 2);
    const rad   = Math.max(0.003, 0.026 - this.gen * 0.003);
    const geo   = new THREE.TubeGeometry(curve, segs, rad, 5, false);
    this.tube   = new THREE.Mesh(geo, this.mat);
    scene.add(this.tube);
  };

  Hypha.prototype.makeSpore = function() {
    const r   = Math.max(0.012, 0.065 - this.gen * 0.007);
    const geo = new THREE.SphereGeometry(r, 7, 7);
    this.spore = new THREE.Mesh(geo, makeSporeMat(this.gen));
    this.spore.position.copy(this.pos);
    scene.add(this.spore);
    nodeMeshes.push(this.spore);
  };

  Hypha.prototype.branch = function() {
    if (this.gen >= MAX_GEN) return;
    if (hyphae.length >= MAX_TOTAL) return;

    const count = this.gen < 2
      ? 2 + Math.floor(Math.random() * 3)
      : 1 + Math.floor(Math.random() * 2);

    const spread = 0.38 + this.gen * 0.14;
    for (let i = 0; i < count; i++) {
      const d = this.dir.clone().add(new THREE.Vector3(
        (Math.random()-0.5)*spread,
        (Math.random()-0.5)*spread*0.5,
        (Math.random()-0.5)*spread
      )).normalize();
      hyphae.push(new Hypha(this.pos, d, this.gen + 1, this.rootId));
    }
  };

  Hypha.prototype.dispose = function() {
    if (this.tube)  { scene.remove(this.tube);  this.tube.geometry.dispose(); }
    if (this.spore) { scene.remove(this.spore); this.spore.geometry.dispose(); }
  };

  // ── Spawn colony ──
  function spawnColony(pos) {
    const id     = rootId++;
    const seeds  = 4 + Math.floor(Math.random() * 4);
    for (let i = 0; i < seeds; i++) {
      const angle = (i / seeds) * Math.PI * 2 + Math.random() * 0.5;
      const dir   = new THREE.Vector3(
        Math.cos(angle) * (0.5 + Math.random() * 0.5),
        0.15 + Math.random() * 0.45,
        Math.sin(angle) * (0.5 + Math.random() * 0.5)
      );
      hyphae.push(new Hypha(pos, dir, 0, id));
    }

    // origin glow dot
    const geo = new THREE.SphereGeometry(0.1, 10, 10);
    const col = new THREE.Color().setHSL(0.25, 0.7, 0.65);
    const mat = new THREE.MeshStandardMaterial({ color: col, emissive: col.clone().multiplyScalar(0.7), roughness: 0.3 });
    const m   = new THREE.Mesh(geo, mat);
    m.position.copy(pos);
    scene.add(m);
    nodeMeshes.push(m);
  }

  // ── Connection lines between nearby tips ──
  let connTimer = 0;
  function updateConnections() {
    connLines.forEach(l => { scene.remove(l); l.geometry.dispose(); });
    connLines = [];
    const pts = tipPositions;
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const d = pts[i].distanceTo(pts[j]);
        if (d < 3.0 && d > 0.05 && Math.random() < 0.1) {
          const geo = new THREE.BufferGeometry().setFromPoints([pts[i], pts[j]]);
          const mat = new THREE.LineBasicMaterial({
            color: new THREE.Color('#3a5818'),
            transparent: true,
            opacity: Math.max(0.03, 0.15 - d * 0.04),
          });
          const line = new THREE.Line(geo, mat);
          scene.add(line);
          connLines.push(line);
        }
      }
    }
  }

  // ── Click → 3D position ──
  const ray   = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const plane = new THREE.Plane(new THREE.Vector3(0, 0.2, 1).normalize(), 0);

  canvas.addEventListener('click', e => {
    if (isDragging) return;
    const rect = canvas.getBoundingClientRect();
    mouse.set(
      ((e.clientX - rect.left) / rect.width)  * 2 - 1,
      -((e.clientY - rect.top)  / rect.height) * 2 + 1
    );
    ray.setFromCamera(mouse, camera);
    const target = new THREE.Vector3();
    if (ray.ray.intersectPlane(plane, target)) {
      spawnColony(target);
    }
  });

  // ── Reset ──
  window.resetScene = function() {
    hyphae.forEach(h => h.dispose());
    hyphae = [];
    nodeMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); });
    nodeMeshes = [];
    connLines.forEach(l => { scene.remove(l); l.geometry.dispose(); });
    connLines = [];
    tipPositions = [];
    rootId = 0;
  };

  // ── Loop ──
  const BATCH = 20;
  let frame   = 0;

  (function loop() {
    requestAnimationFrame(loop);
    frame++;

    updateCamera();

    // grow hyphae in batches
    const alive = hyphae.filter(h => !h.grown);
    alive.slice(0, BATCH).forEach(h => h.tick());

    // update connections periodically
    connTimer++;
    if (connTimer % 80 === 0 && tipPositions.length > 1) updateConnections();

    // light flicker
    pt1.intensity = 2.8 + Math.sin(frame * 0.012) * 0.4;
    pt3.position.set(Math.sin(frame * 0.006) * 6, 2, Math.cos(frame * 0.006) * 4);

    renderer.render(scene, camera);
  })();

  // ── Resize ──
  window.addEventListener('resize', () => {
    W = window.innerWidth; H = window.innerHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });

  // ── Initial colony ──
  setTimeout(() => spawnColony(new THREE.Vector3(0, 0, 0)), 200);
}
</script>
</body>
</html>
